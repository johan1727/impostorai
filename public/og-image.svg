<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Juego del Impostor para fiestas</title>
  <desc id="desc">Party game sin internet para 3 a 24 jugadores con un solo celular.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a2b" />
      <stop offset="55%" stop-color="#2b124f" />
      <stop offset="100%" stop-color="#3d175d" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7b54" />
      <stop offset="100%" stop-color="#e040fb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1030" cy="120" r="110" fill="#ffffff" opacity="0.05" />
  <circle cx="180" cy="520" r="140" fill="#ff7b54" opacity="0.08" />
  <circle cx="1020" cy="500" r="160" fill="#e040fb" opacity="0.08" />

  <g filter="url(#shadow)">
    <rect x="90" y="86" width="1020" height="458" rx="36" fill="#241042" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.08" />
  </g>

  <text x="140" y="170" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="2" fill="#ffb08b">JUEGO DEL IMPOSTOR PARA FIESTAS</text>
  <text x="140" y="260" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#ffffff">El Impostor</text>
  <text x="140" y="330" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#d8d0ef">Party game sin internet para 3 a 24 jugadores</text>
  <text x="140" y="376" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#c7bddf">Un solo celular. Rondas rápidas. Modo +18 y peda.</text>

  <rect x="140" y="430" width="365" height="74" rx="18" fill="url(#accent)" />
  <text x="322" y="474" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Crear partida local</text>

  <circle cx="920" cy="264" r="110" fill="#ffcc80" />
  <text x="920" y="300" text-anchor="middle" font-size="118">🕵️</text>

  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#f4efff">
    <rect x="660" y="400" width="170" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" />
    <text x="745" y="428" text-anchor="middle">📱 Un celular</text>
    <rect x="846" y="400" width="180" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" />
    <text x="936" y="428" text-anchor="middle">⚡ Rondas rápidas</text>
    <rect x="740" y="458" width="210" height="42" rx="21" fill="#ffffff" fill-opacity="0.06" />
    <text x="845" y="486" text-anchor="middle">🍻 +18 y modo peda</text>
  </g>
</svg>
